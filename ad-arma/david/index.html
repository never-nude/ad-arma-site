<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Michelangelo's David - Marble Node/Edge 3D Model</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        --bg: #0d1218;
        --panel: #131a23;
        --text: #dce4ef;
        --subtle: #8ea0b8;
        --edge: #86add6;
        --node: #f4f8ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 15%, #1f2a37 0%, var(--bg) 60%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      .header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #243345;
        background: rgba(19, 26, 35, 0.95);
        backdrop-filter: blur(3px);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 0;
        color: var(--subtle);
        font-size: 13px;
      }
      .controls {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px 12px;
      }
      .control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--subtle);
      }
      .control label {
        min-width: 68px;
        color: var(--text);
      }
      .control input[type="range"] {
        width: 100%;
      }
      .control output {
        min-width: 38px;
        text-align: right;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      .control input[type="color"] {
        width: 42px;
        height: 26px;
        border: 1px solid #2f4158;
        border-radius: 4px;
        background: transparent;
        padding: 0;
      }
      .toggles {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
        font-size: 12px;
        color: var(--subtle);
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn {
        border: 1px solid #334861;
        color: var(--text);
        background: #192433;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      #plot {
        flex: 1;
        min-height: 260px;
        width: 100%;
      }
      .loading {
        padding: 24px 18px;
        color: var(--subtle);
      }
      a {
        color: #9ec5ff;
      }
      @media (max-width: 720px) {
        .control label {
          min-width: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>Michelangelo's David: Marble Surface + Node/Edge</h1>
        <p class="sub" id="stats">Loading model data...</p>

        <div class="controls">
          <div class="control"><label for="lightX">Light X</label><input id="lightX" type="range" min="-4" max="4" step="0.05" value="1.7" /><output id="lightXv">1.70</output></div>
          <div class="control"><label for="lightY">Light Y</label><input id="lightY" type="range" min="-4" max="4" step="0.05" value="1.5" /><output id="lightYv">1.50</output></div>
          <div class="control"><label for="lightZ">Light Z</label><input id="lightZ" type="range" min="-4" max="4" step="0.05" value="1.3" /><output id="lightZv">1.30</output></div>
          <div class="control"><label for="spinSpeed">Spin</label><input id="spinSpeed" type="range" min="0" max="2" step="0.01" value="0.70" /><output id="spinSpeedv">0.70</output></div>
          <div class="control"><label for="ambient">Ambient</label><input id="ambient" type="range" min="0" max="1" step="0.01" value="0.42" /><output id="ambientv">0.42</output></div>
          <div class="control"><label for="diffuse">Diffuse</label><input id="diffuse" type="range" min="0" max="1" step="0.01" value="0.72" /><output id="diffusev">0.72</output></div>
          <div class="control"><label for="specular">Specular</label><input id="specular" type="range" min="0" max="1" step="0.01" value="0.30" /><output id="specularv">0.30</output></div>
          <div class="control"><label for="roughness">Roughness</label><input id="roughness" type="range" min="0" max="1" step="0.01" value="0.80" /><output id="roughnessv">0.80</output></div>
          <div class="control"><label for="fresnel">Fresnel</label><input id="fresnel" type="range" min="0" max="1" step="0.01" value="0.08" /><output id="fresnelv">0.08</output></div>
          <div class="control"><label for="marble">Marble</label><input id="marble" type="color" value="#d7d0c0" /></div>
        </div>

        <div class="toggles">
          <label class="toggle"><input id="autoRotate" type="checkbox" checked /> Auto Rotate</label>
          <label class="toggle"><input id="showEdges" type="checkbox" checked /> Edges</label>
          <label class="toggle"><input id="showNodes" type="checkbox" checked /> Nodes</label>
          <button id="resetLighting" class="btn" type="button">Reset Lighting</button>
        </div>
      </div>

      <div id="plot">
        <div class="loading">
          If this does not load from <code>file://</code>, run
          <code>python3 -m http.server 8000</code> in this folder and open
          <a href="http://localhost:8000">http://localhost:8000</a>.
        </div>
      </div>
    </div>

    <script>
      const DEFAULTS = {
        lightX: 1.7,
        lightY: 1.5,
        lightZ: 1.3,
        spinSpeed: 0.70,
        ambient: 0.42,
        diffuse: 0.72,
        specular: 0.30,
        roughness: 0.80,
        fresnel: 0.08,
        marble: "#d7d0c0"
      };

      function numberValue(id) {
        return Number(document.getElementById(id).value);
      }

      function updateReadouts() {
        const ids = ["lightX", "lightY", "lightZ", "spinSpeed", "ambient", "diffuse", "specular", "roughness", "fresnel"];
        for (const id of ids) {
          document.getElementById(id + "v").textContent = numberValue(id).toFixed(2);
        }
      }

      async function load() {
        const response = await fetch("./david_wireframe.json");
        if (!response.ok) {
          throw new Error(`Failed to load david_wireframe.json (${response.status})`);
        }
        const model = await response.json();

        const vertices = model.vertices;
        const faces = model.faces || [];
        const edges = model.edges;
        const nodes = model.nodes;

        const vx = [];
        const vy = [];
        const vz = [];
        for (const [x, y, z] of vertices) {
          vx.push(x);
          vy.push(y);
          vz.push(z);
        }

        const fi = [];
        const fj = [];
        const fk = [];
        for (const [a, b, c] of faces) {
          fi.push(a);
          fj.push(b);
          fk.push(c);
        }

        const ex = [];
        const ey = [];
        const ez = [];
        for (const [a, b] of edges) {
          const va = vertices[a];
          const vb = vertices[b];
          ex.push(va[0], vb[0], null);
          ey.push(va[1], vb[1], null);
          ez.push(va[2], vb[2], null);
        }

        const nx = [];
        const ny = [];
        const nz = [];
        for (const [x, y, z] of nodes) {
          nx.push(x);
          ny.push(y);
          nz.push(z);
        }

        const meshTrace = {
          type: "mesh3d",
          x: vx,
          y: vy,
          z: vz,
          i: fi,
          j: fj,
          k: fk,
          color: DEFAULTS.marble,
          opacity: 1.0,
          flatshading: false,
          hoverinfo: "skip",
          lighting: {
            ambient: DEFAULTS.ambient,
            diffuse: DEFAULTS.diffuse,
            specular: DEFAULTS.specular,
            roughness: DEFAULTS.roughness,
            fresnel: DEFAULTS.fresnel
          },
          lightposition: {
            x: DEFAULTS.lightX,
            y: DEFAULTS.lightY,
            z: DEFAULTS.lightZ
          },
          name: "Marble"
        };

        const edgeTrace = {
          type: "scatter3d",
          mode: "lines",
          x: ex,
          y: ey,
          z: ez,
          line: {
            color: getComputedStyle(document.documentElement).getPropertyValue("--edge").trim(),
            width: 1
          },
          opacity: 0.50,
          hoverinfo: "skip",
          name: "Edges"
        };

        const nodeTrace = {
          type: "scatter3d",
          mode: "markers",
          x: nx,
          y: ny,
          z: nz,
          marker: {
            size: 1.6,
            color: getComputedStyle(document.documentElement).getPropertyValue("--node").trim(),
            opacity: 0.24
          },
          hoverinfo: "skip",
          name: "Nodes"
        };

        const layout = {
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          margin: { l: 0, r: 0, t: 0, b: 0 },
          showlegend: false,
          scene: {
            xaxis: { visible: false },
            yaxis: { visible: false },
            zaxis: { visible: false },
            aspectmode: "data",
            camera: {
              eye: { x: 1.7, y: 1.5, z: 1.2 }
            }
          }
        };

        await Plotly.newPlot("plot", [meshTrace, edgeTrace, nodeTrace], layout, {
          responsive: true,
          displaylogo: false
        });

        const rotation = {
          angle: Math.atan2(layout.scene.camera.eye.y, layout.scene.camera.eye.x),
          radius: Math.hypot(layout.scene.camera.eye.x, layout.scene.camera.eye.y),
          z: layout.scene.camera.eye.z,
          lastTs: 0
        };

        function animate(ts) {
          if (!rotation.lastTs) {
            rotation.lastTs = ts;
          }
          const dt = ts - rotation.lastTs;
          rotation.lastTs = ts;

          if (document.getElementById("autoRotate").checked) {
            rotation.angle += dt * numberValue("spinSpeed") * 0.0014;
            Plotly.relayout("plot", {
              "scene.camera.eye": {
                x: Math.cos(rotation.angle) * rotation.radius,
                y: Math.sin(rotation.angle) * rotation.radius,
                z: rotation.z
              }
            });
          }

          window.requestAnimationFrame(animate);
        }
        window.requestAnimationFrame(animate);

        function applyMaterialAndLight() {
          updateReadouts();
          const marble = document.getElementById("marble").value;
          Plotly.restyle(
            "plot",
            {
              color: [marble],
              "lighting.ambient": [numberValue("ambient")],
              "lighting.diffuse": [numberValue("diffuse")],
              "lighting.specular": [numberValue("specular")],
              "lighting.roughness": [numberValue("roughness")],
              "lighting.fresnel": [numberValue("fresnel")],
              "lightposition.x": [numberValue("lightX")],
              "lightposition.y": [numberValue("lightY")],
              "lightposition.z": [numberValue("lightZ")]
            },
            [0]
          );

          Plotly.restyle("plot", { visible: [document.getElementById("showEdges").checked] }, [1]);
          Plotly.restyle("plot", { visible: [document.getElementById("showNodes").checked] }, [2]);
        }

        const ids = [
          "lightX",
          "lightY",
          "lightZ",
          "spinSpeed",
          "ambient",
          "diffuse",
          "specular",
          "roughness",
          "fresnel",
          "marble",
          "autoRotate",
          "showEdges",
          "showNodes"
        ];
        for (const id of ids) {
          document.getElementById(id).addEventListener("input", applyMaterialAndLight);
          document.getElementById(id).addEventListener("change", applyMaterialAndLight);
        }

        document.getElementById("resetLighting").addEventListener("click", () => {
          for (const [k, v] of Object.entries(DEFAULTS)) {
            document.getElementById(k).value = String(v);
          }
          document.getElementById("autoRotate").checked = true;
          document.getElementById("showEdges").checked = true;
          document.getElementById("showNodes").checked = true;
          rotation.lastTs = 0;
          applyMaterialAndLight();
        });

        applyMaterialAndLight();

        const facesTotal = model.meta.faces_total || model.meta.faces;
        document.getElementById("stats").textContent =
          `Source triangles: ${model.meta.source_triangles.toLocaleString()} | ` +
          `Sample stride: ${model.meta.triangle_stride} | ` +
          `Faces: ${model.meta.faces.toLocaleString()} (from ${facesTotal.toLocaleString()}) | ` +
          `Edges: ${model.meta.edges.toLocaleString()} | ` +
          `Nodes: ${model.meta.nodes.toLocaleString()}`;
      }

      load().catch((error) => {
        const plot = document.getElementById("plot");
        plot.innerHTML = `<div class="loading">Error loading model: ${error.message}</div>`;
      });
    </script>
  </body>
</html>
