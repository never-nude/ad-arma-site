<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Michelangelo's David - 3D Study Viewer</title>
    <style>
      :root {
        --bg0: #0b1219;
        --bg1: #23364a;
        --panel: #121c27;
        --panel-border: #2f465d;
        --text: #e7effa;
        --muted: #9cb0c8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 18% 10%, var(--bg1) 0%, var(--bg0) 66%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }
      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .panel {
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--panel-border);
        background: rgba(18, 28, 39, 0.96);
      }
      .title {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 4px 0 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 8px 12px;
      }
      .control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .control label {
        min-width: 92px;
        color: var(--text);
      }
      .control input[type="range"] {
        width: 100%;
      }
      .control output {
        min-width: 40px;
        text-align: right;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--muted);
        flex-wrap: wrap;
      }
      .row label {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn {
        border: 1px solid #3f5978;
        border-radius: 6px;
        background: #1a2a3d;
        color: var(--text);
        font-size: 12px;
        padding: 4px 10px;
        cursor: pointer;
      }
      #stage {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .loading {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <h1 class="title">Michelangelo's David: 3D Light Study</h1>
        <p id="stats" class="sub">Preparing 3D scene...</p>

        <div class="grid">
          <div class="control"><label for="spin">Spin</label><input id="spin" type="range" min="0" max="2.2" step="0.01" value="0.38" /><output id="spinv">0.38</output></div>
          <div class="control"><label for="zoom">Zoom</label><input id="zoom" type="range" min="0.9" max="5.5" step="0.01" value="2.30" /><output id="zoomv">2.30</output></div>
          <div class="control"><label for="lightAngle">Light Angle</label><input id="lightAngle" type="range" min="-180" max="180" step="1" value="35" /><output id="lightAnglev">35.00</output></div>
          <div class="control"><label for="lightPower">Light Power</label><input id="lightPower" type="range" min="0" max="3" step="0.01" value="1.30" /><output id="lightPowerv">1.30</output></div>
        </div>

        <div class="row">
          <label><input id="canManipulate" type="checkbox" checked /> Manipulate</label>
          <label><input id="autoRotate" type="checkbox" checked /> Auto Rotate</label>
          <label><input id="multiLight" type="checkbox" checked /> Multi-Light</label>
          <button id="resetBtn" class="btn" type="button">Reset</button>
          <span>Drag to rotate. Scroll/pinch to zoom. Shift+drag to pan.</span>
        </div>
      </section>

      <section id="stage">
        <div class="loading" id="loading">Preparing 3D scene...</div>
      </section>
    </div>

    <script type="module">
      const MODEL_URL = "./david_study_mesh.json";

      const stage = document.getElementById("stage");
      const stats = document.getElementById("stats");
      const loading = document.getElementById("loading");

      const defaults = {
        spin: 0.38,
        zoom: 2.30,
        lightAngle: 35,
        lightPower: 1.30,
        canManipulate: true,
        autoRotate: true,
        multiLight: true
      };

      const rangeIds = ["spin", "zoom", "lightAngle", "lightPower"];
      const checkboxIds = ["canManipulate", "autoRotate", "multiLight"];

      function n(id) {
        return Number(document.getElementById(id).value);
      }

      function refreshReadouts() {
        for (const id of rangeIds) {
          document.getElementById(id + "v").textContent = n(id).toFixed(2);
        }
      }

      function setDefaults() {
        for (const id of rangeIds) {
          document.getElementById(id).value = String(defaults[id]);
        }
        for (const id of checkboxIds) {
          document.getElementById(id).checked = defaults[id];
        }
        refreshReadouts();
      }

      async function init() {
        setDefaults();

        let THREE;
        let OrbitControls;
        try {
          THREE = await import("https://esm.sh/three@0.161.0?bundle");
          ({ OrbitControls } = await import("https://esm.sh/three@0.161.0/examples/jsm/controls/OrbitControls.js?bundle"));
        } catch (error) {
          loading.textContent = `Module load error: ${error.message}`;
          stats.textContent = "Failed to load 3D engine modules.";
          return;
        }

        let model;
        try {
          const response = await fetch(MODEL_URL);
          if (!response.ok) {
            throw new Error(`Failed to load ${MODEL_URL} (${response.status})`);
          }
          model = await response.json();
        } catch (error) {
          loading.textContent = `Mesh load error: ${error.message}`;
          stats.textContent = "Failed to load sculpture mesh.";
          return;
        }

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.3));
        renderer.setSize(stage.clientWidth, stage.clientHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        loading.remove();
        stage.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b1219);

        const camera = new THREE.PerspectiveCamera(44, stage.clientWidth / stage.clientHeight, 0.01, 80);
        camera.position.set(1.8, 1.2, defaults.zoom);

        const ambient = new THREE.HemisphereLight(0xf6f9ff, 0x202c3a, 0.18);
        scene.add(ambient);

        const keyLight = new THREE.DirectionalLight(0xfff4e9, defaults.lightPower);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024, 1024);
        keyLight.shadow.camera.near = 0.1;
        keyLight.shadow.camera.far = 14;
        keyLight.shadow.camera.left = -2.6;
        keyLight.shadow.camera.right = 2.6;
        keyLight.shadow.camera.top = 2.6;
        keyLight.shadow.camera.bottom = -2.6;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xd1e0f2, defaults.lightPower * 0.45);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xeaf0ff, defaults.lightPower * 0.35);
        scene.add(rimLight);

        const floor = new THREE.Mesh(
          new THREE.CircleGeometry(2.9, 64),
          new THREE.ShadowMaterial({ opacity: 0.30 })
        );
        floor.rotation.x = -Math.PI * 0.5;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(new Float32Array(model.positions), 3));
        geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(model.indices), 1));
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();

        const box = geometry.boundingBox;
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        geometry.translate(-center.x, -box.min.y, -center.z);

        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color("#d9d1c3"),
          roughness: 0.72,
          metalness: 0.02
        });

        const david = new THREE.Mesh(geometry, material);
        const targetHeight = 1.72;
        const scale = targetHeight / size.y;
        david.scale.setScalar(scale);
        david.castShadow = true;
        david.receiveShadow = true;
        scene.add(david);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = true;
        controls.minDistance = 0.9;
        controls.maxDistance = 5.8;
        controls.target.set(0, 0.94, 0);
        controls.autoRotate = defaults.autoRotate;
        controls.autoRotateSpeed = defaults.spin;
        controls.zoomSpeed = 0.9;
        controls.rotateSpeed = 0.8;

        function setDistance(distance) {
          const dir = camera.position.clone().sub(controls.target).normalize();
          camera.position.copy(controls.target.clone().add(dir.multiplyScalar(distance)));
        }

        function sync() {
          refreshReadouts();

          const angle = THREE.MathUtils.degToRad(n("lightAngle"));
          const power = n("lightPower");
          const radius = 3.5;
          const height = 3.2;

          keyLight.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
          keyLight.intensity = power;

          const multi = document.getElementById("multiLight").checked;
          fillLight.visible = multi;
          rimLight.visible = multi;

          if (multi) {
            fillLight.position.set(Math.cos(angle + 2.2) * 2.8, 1.8, Math.sin(angle + 2.2) * 2.8);
            rimLight.position.set(Math.cos(angle - 2.4) * 3.0, 2.6, Math.sin(angle - 2.4) * 3.0);
            fillLight.intensity = power * 0.45;
            rimLight.intensity = power * 0.35;
            ambient.intensity = 0.22;
          } else {
            ambient.intensity = 0.12;
          }

          controls.enabled = document.getElementById("canManipulate").checked;
          controls.autoRotate = document.getElementById("autoRotate").checked;
          controls.autoRotateSpeed = n("spin");
          setDistance(n("zoom"));
        }

        for (const id of rangeIds) {
          const el = document.getElementById(id);
          el.addEventListener("input", sync);
          el.addEventListener("change", sync);
        }
        for (const id of checkboxIds) {
          const el = document.getElementById(id);
          el.addEventListener("input", sync);
          el.addEventListener("change", sync);
        }

        document.getElementById("resetBtn").addEventListener("click", () => {
          setDefaults();
          camera.position.set(1.8, 1.2, defaults.zoom);
          controls.target.set(0, 0.94, 0);
          controls.update();
          sync();
        });

        window.addEventListener("resize", () => {
          camera.aspect = stage.clientWidth / stage.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(stage.clientWidth, stage.clientHeight);
        });

        stats.textContent =
          `Triangles: ${model.meta.faces.toLocaleString()} | Vertices: ${model.meta.vertices.toLocaleString()} | ` +
          `4 controls only: Spin, Zoom, Light Angle, Light Power.`;

        sync();

        function frame() {
          requestAnimationFrame(frame);
          controls.update();
          renderer.render(scene, camera);
        }
        frame();
      }

      init();
    </script>
  </body>
</html>
