<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Michelangelo's David - 3D Study Viewer</title>
    <style>
      :root {
        --bg0: #0b1219;
        --bg1: #1f3142;
        --panel: #121c26;
        --panel-border: #2f4358;
        --text: #e6eef8;
        --muted: #99aec6;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 12%, var(--bg1) 0%, var(--bg0) 64%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }
      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .panel {
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--panel-border);
        background: color-mix(in srgb, var(--panel) 95%, transparent);
      }
      .title {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 4px 0 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 8px 12px;
      }
      .control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .control label {
        min-width: 92px;
        color: var(--text);
      }
      .control input[type="range"] {
        width: 100%;
      }
      .control output {
        min-width: 40px;
        text-align: right;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .control input[type="color"] {
        width: 44px;
        height: 26px;
        border: 1px solid #415974;
        border-radius: 4px;
        background: transparent;
        padding: 0;
      }
      .row {
        margin-top: 9px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--muted);
      }
      .row label {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn {
        border: 1px solid #3e5673;
        border-radius: 6px;
        background: #1a2839;
        color: var(--text);
        font-size: 12px;
        padding: 4px 10px;
        cursor: pointer;
      }
      #stage {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .loading {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
      }
      @media (max-width: 820px) {
        .control label {
          min-width: 80px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <h1 class="title">Michelangelo's David: 3D Light Study</h1>
        <p id="stats" class="sub">Loading sculpture mesh...</p>

        <div class="grid">
          <div class="control"><label for="spin">Spin</label><input id="spin" type="range" min="0" max="2.2" step="0.01" value="0.42" /><output id="spinv">0.42</output></div>
          <div class="control"><label for="zoom">Zoom</label><input id="zoom" type="range" min="0.8" max="5.5" step="0.01" value="2.25" /><output id="zoomv">2.25</output></div>
          <div class="control"><label for="exposure">Exposure</label><input id="exposure" type="range" min="0.5" max="2.2" step="0.01" value="1.05" /><output id="exposurev">1.05</output></div>
          <div class="control"><label for="marble">Marble</label><input id="marble" type="color" value="#d8d1c3" /></div>

          <div class="control"><label for="matRough">Mat Rough</label><input id="matRough" type="range" min="0.2" max="1" step="0.01" value="0.66" /><output id="matRoughv">0.66</output></div>
          <div class="control"><label for="matClear">Clearcoat</label><input id="matClear" type="range" min="0" max="1" step="0.01" value="0.18" /><output id="matClearv">0.18</output></div>
          <div class="control"><label for="ambientI">Ambient</label><input id="ambientI" type="range" min="0" max="1.2" step="0.01" value="0.42" /><output id="ambientIv">0.42</output></div>

          <div class="control"><label for="keyI">Key Int</label><input id="keyI" type="range" min="0" max="3" step="0.01" value="1.28" /><output id="keyIv">1.28</output></div>
          <div class="control"><label for="keyX">Key X</label><input id="keyX" type="range" min="-6" max="6" step="0.05" value="2.2" /><output id="keyXv">2.20</output></div>
          <div class="control"><label for="keyY">Key Y</label><input id="keyY" type="range" min="0.2" max="8" step="0.05" value="3.8" /><output id="keyYv">3.80</output></div>
          <div class="control"><label for="keyZ">Key Z</label><input id="keyZ" type="range" min="-6" max="6" step="0.05" value="2.0" /><output id="keyZv">2.00</output></div>

          <div class="control"><label for="fillI">Fill Int</label><input id="fillI" type="range" min="0" max="2" step="0.01" value="0.46" /><output id="fillIv">0.46</output></div>
          <div class="control"><label for="fillX">Fill X</label><input id="fillX" type="range" min="-6" max="6" step="0.05" value="-2.0" /><output id="fillXv">-2.00</output></div>
          <div class="control"><label for="fillY">Fill Y</label><input id="fillY" type="range" min="0.2" max="8" step="0.05" value="1.8" /><output id="fillYv">1.80</output></div>
          <div class="control"><label for="fillZ">Fill Z</label><input id="fillZ" type="range" min="-6" max="6" step="0.05" value="-1.8" /><output id="fillZv">-1.80</output></div>

          <div class="control"><label for="rimI">Rim Int</label><input id="rimI" type="range" min="0" max="2" step="0.01" value="0.35" /><output id="rimIv">0.35</output></div>
          <div class="control"><label for="rimX">Rim X</label><input id="rimX" type="range" min="-6" max="6" step="0.05" value="0.4" /><output id="rimXv">0.40</output></div>
          <div class="control"><label for="rimY">Rim Y</label><input id="rimY" type="range" min="0.2" max="8" step="0.05" value="2.6" /><output id="rimYv">2.60</output></div>
          <div class="control"><label for="rimZ">Rim Z</label><input id="rimZ" type="range" min="-6" max="6" step="0.05" value="-3.0" /><output id="rimZv">-3.00</output></div>
        </div>

        <div class="row">
          <label><input id="canManipulate" type="checkbox" checked /> Manipulate</label>
          <label><input id="autoRotate" type="checkbox" checked /> Auto Rotate</label>
          <label><input id="useKey" type="checkbox" checked /> Key Light</label>
          <label><input id="useFill" type="checkbox" checked /> Fill Light</label>
          <label><input id="useRim" type="checkbox" checked /> Rim Light</label>
          <button id="resetBtn" class="btn" type="button">Reset</button>
          <span>Drag to rotate. Scroll or pinch to zoom. Shift+drag to pan.</span>
        </div>
      </section>

      <section id="stage">
        <div class="loading" id="loading">Preparing 3D scene...</div>
      </section>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
      import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
      import { RoomEnvironment } from "https://unpkg.com/three@0.161.0/examples/jsm/environments/RoomEnvironment.js";

      const MODEL_URL = "./david_study_mesh.json";
      const stage = document.getElementById("stage");
      const stats = document.getElementById("stats");
      const loading = document.getElementById("loading");

      const defaults = {
        spin: 0.42,
        zoom: 2.25,
        exposure: 1.05,
        marble: "#d8d1c3",
        matRough: 0.66,
        matClear: 0.18,
        ambientI: 0.42,
        keyI: 1.28,
        keyX: 2.2,
        keyY: 3.8,
        keyZ: 2.0,
        fillI: 0.46,
        fillX: -2.0,
        fillY: 1.8,
        fillZ: -1.8,
        rimI: 0.35,
        rimX: 0.4,
        rimY: 2.6,
        rimZ: -3.0,
        canManipulate: true,
        autoRotate: true,
        useKey: true,
        useFill: true,
        useRim: true
      };

      const rangeIds = [
        "spin",
        "zoom",
        "exposure",
        "matRough",
        "matClear",
        "ambientI",
        "keyI",
        "keyX",
        "keyY",
        "keyZ",
        "fillI",
        "fillX",
        "fillY",
        "fillZ",
        "rimI",
        "rimX",
        "rimY",
        "rimZ"
      ];

      const checkboxIds = ["canManipulate", "autoRotate", "useKey", "useFill", "useRim"];

      function n(id) {
        return Number(document.getElementById(id).value);
      }

      function refreshReadouts() {
        for (const id of rangeIds) {
          const out = document.getElementById(id + "v");
          if (out) out.textContent = n(id).toFixed(2);
        }
      }

      function setDefaults() {
        for (const id of rangeIds) {
          document.getElementById(id).value = String(defaults[id]);
        }
        document.getElementById("marble").value = defaults.marble;
        for (const id of checkboxIds) {
          document.getElementById(id).checked = defaults[id];
        }
        refreshReadouts();
      }

      async function init() {
        setDefaults();

        const response = await fetch(MODEL_URL);
        if (!response.ok) {
          throw new Error(`Failed to load ${MODEL_URL} (${response.status})`);
        }
        const model = await response.json();

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(stage.clientWidth, stage.clientHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = defaults.exposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        loading.remove();
        stage.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b1219);

        const camera = new THREE.PerspectiveCamera(44, stage.clientWidth / stage.clientHeight, 0.01, 80);
        camera.position.set(1.85, 1.25, defaults.zoom);

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

        const hemi = new THREE.HemisphereLight(0xf3f8ff, 0x1e2a37, defaults.ambientI);
        scene.add(hemi);

        const keyLight = new THREE.DirectionalLight(0xfff4e8, defaults.keyI);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024, 1024);
        keyLight.shadow.camera.near = 0.1;
        keyLight.shadow.camera.far = 14;
        keyLight.shadow.camera.left = -2.6;
        keyLight.shadow.camera.right = 2.6;
        keyLight.shadow.camera.top = 2.6;
        keyLight.shadow.camera.bottom = -2.6;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xd2e2f5, defaults.fillI);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xe9efff, defaults.rimI, 18, 2.0);
        scene.add(rimLight);

        const floor = new THREE.Mesh(
          new THREE.CircleGeometry(2.9, 64),
          new THREE.ShadowMaterial({ opacity: 0.30 })
        );
        floor.rotation.x = -Math.PI * 0.5;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(new Float32Array(model.positions), 3));
        geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(model.indices), 1));
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();

        const box = geometry.boundingBox;
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        geometry.translate(-center.x, -box.min.y, -center.z);

        const mat = new THREE.MeshPhysicalMaterial({
          color: new THREE.Color(defaults.marble),
          roughness: defaults.matRough,
          metalness: 0.02,
          clearcoat: defaults.matClear,
          clearcoatRoughness: 0.42,
          reflectivity: 0.45,
          envMapIntensity: 0.9
        });

        const david = new THREE.Mesh(geometry, mat);
        const targetHeight = 1.72;
        const scale = targetHeight / size.y;
        david.scale.setScalar(scale);
        david.castShadow = true;
        david.receiveShadow = true;
        scene.add(david);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = true;
        controls.minDistance = 0.9;
        controls.maxDistance = 5.8;
        controls.target.set(0, 0.94, 0);
        controls.autoRotate = defaults.autoRotate;
        controls.autoRotateSpeed = defaults.spin;
        controls.zoomSpeed = 0.9;
        controls.rotateSpeed = 0.8;

        function sync() {
          refreshReadouts();
          renderer.toneMappingExposure = n("exposure");
          mat.color.set(document.getElementById("marble").value);
          mat.roughness = n("matRough");
          mat.clearcoat = n("matClear");
          mat.needsUpdate = true;

          hemi.intensity = n("ambientI");

          keyLight.visible = document.getElementById("useKey").checked;
          keyLight.intensity = n("keyI");
          keyLight.position.set(n("keyX"), n("keyY"), n("keyZ"));

          fillLight.visible = document.getElementById("useFill").checked;
          fillLight.intensity = n("fillI");
          fillLight.position.set(n("fillX"), n("fillY"), n("fillZ"));

          rimLight.visible = document.getElementById("useRim").checked;
          rimLight.intensity = n("rimI");
          rimLight.position.set(n("rimX"), n("rimY"), n("rimZ"));

          controls.enabled = document.getElementById("canManipulate").checked;
          controls.autoRotate = document.getElementById("autoRotate").checked;
          controls.autoRotateSpeed = n("spin");

          const currentZoom = n("zoom");
          const dir = camera.position.clone().sub(controls.target).normalize();
          camera.position.copy(controls.target.clone().add(dir.multiplyScalar(currentZoom)));
          camera.updateProjectionMatrix();
        }

        for (const id of rangeIds) {
          const el = document.getElementById(id);
          el.addEventListener("input", sync);
          el.addEventListener("change", sync);
        }
        document.getElementById("marble").addEventListener("input", sync);
        document.getElementById("marble").addEventListener("change", sync);
        for (const id of checkboxIds) {
          const el = document.getElementById(id);
          el.addEventListener("input", sync);
          el.addEventListener("change", sync);
        }

        document.getElementById("resetBtn").addEventListener("click", () => {
          setDefaults();
          camera.position.set(1.85, 1.25, defaults.zoom);
          controls.target.set(0, 0.94, 0);
          controls.update();
          sync();
        });

        window.addEventListener("resize", () => {
          camera.aspect = stage.clientWidth / stage.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(stage.clientWidth, stage.clientHeight);
        });

        stats.textContent =
          `Triangles: ${model.meta.faces.toLocaleString()} | Vertices: ${model.meta.vertices.toLocaleString()} | ` +
          `Use one or many light sources to study form and shadow.`;

        sync();

        function frame() {
          requestAnimationFrame(frame);
          controls.update();
          renderer.render(scene, camera);
        }
        frame();
      }

      init().catch((error) => {
        loading.textContent = `Viewer error: ${error.message}`;
        stats.textContent = "Could not initialize the sculpture viewer.";
      });
    </script>
  </body>
</html>
