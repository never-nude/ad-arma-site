<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Michelangelo's Pieta (1498-1499) - Real-Time Marble Viewer</title>
    <style>
      :root {
        --bg: #0d1218;
        --panel: #151f2a;
        --panel-border: #2c3d53;
        --text: #e5edf8;
        --muted: #9ab0cb;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 15%, #223245 0%, #0d1218 62%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }
      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .panel {
        padding: 12px 14px 10px;
        background: color-mix(in srgb, var(--panel) 95%, transparent);
        border-bottom: 1px solid var(--panel-border);
      }
      .title {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.02em;
      }
      .sub {
        margin: 4px 0 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 8px 12px;
      }
      .control {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .control label {
        min-width: 86px;
        color: var(--text);
      }
      .control input[type="range"] {
        width: 100%;
      }
      .control output {
        min-width: 38px;
        text-align: right;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .control input[type="color"] {
        width: 44px;
        height: 26px;
        border: 1px solid #3a4d66;
        border-radius: 4px;
        background: transparent;
        padding: 0;
      }
      .row {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--muted);
      }
      .row label {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn {
        border: 1px solid #38506e;
        border-radius: 6px;
        background: #1a2838;
        color: var(--text);
        font-size: 12px;
        padding: 4px 10px;
        cursor: pointer;
      }
      #stage {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .loading {
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 14px;
      }
      @media (max-width: 760px) {
        .control label {
          min-width: 72px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel">
        <h1 class="title">Michelangelo's Pieta (1498-1499): Studio Marble View</h1>
        <p class="sub" id="stats">Loading model...</p>

        <div class="controls">
          <div class="control"><label for="speed">Spin</label><input id="speed" type="range" min="0" max="2.5" step="0.01" value="0.42" /><output id="speedv">0.42</output></div>
          <div class="control"><label for="lightX">Light X</label><input id="lightX" type="range" min="-5" max="5" step="0.05" value="2.2" /><output id="lightXv">2.20</output></div>
          <div class="control"><label for="lightY">Light Y</label><input id="lightY" type="range" min="0.2" max="8" step="0.05" value="3.8" /><output id="lightYv">3.80</output></div>
          <div class="control"><label for="lightZ">Light Z</label><input id="lightZ" type="range" min="-5" max="5" step="0.05" value="2.0" /><output id="lightZv">2.00</output></div>
          <div class="control"><label for="lightI">Light Int</label><input id="lightI" type="range" min="0" max="3" step="0.01" value="1.30" /><output id="lightIv">1.30</output></div>
          <div class="control"><label for="exposure">Exposure</label><input id="exposure" type="range" min="0.5" max="2" step="0.01" value="1.05" /><output id="exposurev">1.05</output></div>
          <div class="control"><label for="rough">Roughness</label><input id="rough" type="range" min="0.2" max="1" step="0.01" value="0.67" /><output id="roughv">0.67</output></div>
          <div class="control"><label for="clearcoat">Clearcoat</label><input id="clearcoat" type="range" min="0" max="1" step="0.01" value="0.22" /><output id="clearcoatv">0.22</output></div>
          <div class="control"><label for="marble">Marble</label><input id="marble" type="color" value="#d7d0c0" /></div>
        </div>

        <div class="row">
          <label><input id="autoRotate" type="checkbox" checked /> Auto Rotate</label>
          <button id="resetView" class="btn" type="button">Reset View</button>
          <span>Hold simulation: drag to grab and rotate, scroll/pinch to zoom.</span>
        </div>
      </section>

      <div id="stage">
        <div class="loading" id="loading">Preparing real-time viewer...</div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
      import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";
      import { RoomEnvironment } from "https://unpkg.com/three@0.161.0/examples/jsm/environments/RoomEnvironment.js";

      const MODEL_URL = "./pieta_wireframe.json";

      const stage = document.getElementById("stage");
      const loading = document.getElementById("loading");
      const stats = document.getElementById("stats");

      const defaults = {
        speed: 0.42,
        lightX: 2.2,
        lightY: 3.8,
        lightZ: 2.0,
        lightI: 1.30,
        exposure: 1.05,
        rough: 0.67,
        clearcoat: 0.22,
        marble: "#d7d0c0"
      };

      const rangeIds = ["speed", "lightX", "lightY", "lightZ", "lightI", "exposure", "rough", "clearcoat"];

      function n(id) {
        return Number(document.getElementById(id).value);
      }

      function refreshReadouts() {
        for (const id of rangeIds) {
          document.getElementById(id + "v").textContent = n(id).toFixed(2);
        }
      }

      async function init() {
        const response = await fetch(MODEL_URL);
        if (!response.ok) {
          throw new Error(`Failed to load ${MODEL_URL} (${response.status})`);
        }
        const model = await response.json();

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(stage.clientWidth, stage.clientHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = defaults.exposure;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        loading.remove();
        stage.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d1218);

        const camera = new THREE.PerspectiveCamera(44, stage.clientWidth / stage.clientHeight, 0.01, 80);
        camera.position.set(1.8, 1.25, 2.1);

        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

        const hemi = new THREE.HemisphereLight(0xeaf2ff, 0x243344, 0.48);
        scene.add(hemi);

        const keyLight = new THREE.DirectionalLight(0xfff4e6, defaults.lightI);
        keyLight.position.set(defaults.lightX, defaults.lightY, defaults.lightZ);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024, 1024);
        keyLight.shadow.camera.near = 0.1;
        keyLight.shadow.camera.far = 12;
        keyLight.shadow.camera.left = -2.3;
        keyLight.shadow.camera.right = 2.3;
        keyLight.shadow.camera.top = 2.3;
        keyLight.shadow.camera.bottom = -2.3;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xc9daef, 0.35);
        fillLight.position.set(-1.6, 1.4, -2.2);
        scene.add(fillLight);

        const floor = new THREE.Mesh(
          new THREE.CircleGeometry(2.7, 72),
          new THREE.ShadowMaterial({ opacity: 0.28 })
        );
        floor.rotation.x = -Math.PI * 0.5;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        const vertices = model.vertices;
        const faces = model.faces || [];
        const positions = new Float32Array(vertices.length * 3);
        for (let i = 0; i < vertices.length; i++) {
          const v = vertices[i];
          positions[i * 3 + 0] = v[0];
          positions[i * 3 + 1] = v[1];
          positions[i * 3 + 2] = v[2];
        }

        const indexArray = new Uint32Array(faces.length * 3);
        for (let i = 0; i < faces.length; i++) {
          const f = faces[i];
          indexArray[i * 3 + 0] = f[0];
          indexArray[i * 3 + 1] = f[1];
          indexArray[i * 3 + 2] = f[2];
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geometry.setIndex(new THREE.BufferAttribute(indexArray, 1));
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();

        const box = geometry.boundingBox;
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        geometry.translate(-center.x, -box.min.y, -center.z);

        const sculptMat = new THREE.MeshPhysicalMaterial({
          color: new THREE.Color(defaults.marble),
          roughness: defaults.rough,
          metalness: 0.02,
          clearcoat: defaults.clearcoat,
          clearcoatRoughness: 0.42,
          reflectivity: 0.5,
          envMapIntensity: 0.9
        });

        const mesh = new THREE.Mesh(geometry, sculptMat);
        const targetHeight = 1.65;
        const scale = targetHeight / size.y;
        mesh.scale.setScalar(scale);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true;
        controls.autoRotateSpeed = defaults.speed;
        controls.minDistance = 0.9;
        controls.maxDistance = 5.2;
        controls.target.set(0, 0.9, 0);

        refreshReadouts();

        function syncControls() {
          controls.autoRotate = document.getElementById("autoRotate").checked;
          controls.autoRotateSpeed = n("speed");
          keyLight.position.set(n("lightX"), n("lightY"), n("lightZ"));
          keyLight.intensity = n("lightI");
          renderer.toneMappingExposure = n("exposure");
          sculptMat.roughness = n("rough");
          sculptMat.clearcoat = n("clearcoat");
          sculptMat.color.set(document.getElementById("marble").value);
          sculptMat.needsUpdate = true;
          refreshReadouts();
        }

        for (const id of [...rangeIds, "marble", "autoRotate"]) {
          const el = document.getElementById(id);
          el.addEventListener("input", syncControls);
          el.addEventListener("change", syncControls);
        }

        document.getElementById("resetView").addEventListener("click", () => {
          for (const [k, v] of Object.entries(defaults)) {
            document.getElementById(k).value = String(v);
          }
          document.getElementById("autoRotate").checked = true;
          camera.position.set(1.8, 1.25, 2.1);
          controls.target.set(0, 0.9, 0);
          controls.update();
          syncControls();
        });

        function onResize() {
          camera.aspect = stage.clientWidth / stage.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(stage.clientWidth, stage.clientHeight);
        }
        window.addEventListener("resize", onResize);

        stats.textContent =
          `Triangles: ${model.meta.faces.toLocaleString()} | Vertices: ${model.meta.vertices.toLocaleString()} | ` +
          `Drag to hold/rotate, pinch or scroll to zoom.`;

        function render() {
          requestAnimationFrame(render);
          controls.update();
          renderer.render(scene, camera);
        }
        syncControls();
        render();
      }

      init().catch((error) => {
        loading.textContent = `Viewer error: ${error.message}`;
        stats.textContent = "Failed to initialize viewer.";
      });
    </script>
  </body>
</html>
