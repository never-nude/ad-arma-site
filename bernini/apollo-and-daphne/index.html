<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Bernini Apollo and Daphne - 3D Viewer</title>
    <style>
      :root {
        --bg0: #efe6d8;
        --bg1: #d8c9b3;
        --panel: #efe6d8f2;
        --panel-border: #c6b79f;
        --text: #2f2a22;
        --muted: #6a5f51;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 18% 8%, var(--bg1) 0%, var(--bg0) 64%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 1fr auto;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .viewer {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .panel {
        padding: 12px 14px 10px;
        border-top: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(6px);
      }
      .title {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.01em;
      }
      .sub {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .link {
        display: inline-block;
        margin-top: 8px;
        color: #5d482d;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
      }
      .link:hover {
        text-decoration: underline;
      }
      @supports (padding: max(0px)) {
        .panel {
          padding-top: max(12px, env(safe-area-inset-top));
          padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
      }
      @media (max-width: 820px) {
        .app {
          display: flex;
          flex-direction: column;
          height: 100svh;
          min-height: 100svh;
        }
        #stage {
          order: 1;
          min-height: 55svh;
          flex: 1 1 auto;
        }
        .panel {
          order: 2;
          border-radius: 16px 16px 0 0;
          box-shadow: 0 -6px 18px #0000001f;
          padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
        }
        .title {
          font-size: 16px;
          line-height: 1.25;
        }
        .sub,
        .link {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section id="stage">
        <iframe
          class="viewer"
          title="Apollo and Daphne by Gian Lorenzo Bernini"
          src="https://sketchfab.com/models/a48523a63b4e4a82ae886075d71c7139/embed?autostart=1&ui_infos=0&ui_watermark=0&ui_hint=0&camera=0"
          allow="autoplay; fullscreen; xr-spatial-tracking"
          allowfullscreen
          mozallowfullscreen="true"
          webkitallowfullscreen="true"
        ></iframe>
      </section>

      <section class="panel">
        <h1 class="title">Gian Lorenzo Bernini: Apollo and Daphne</h1>
        <p class="sub">Interactive 3D study. Drag to rotate, scroll/pinch to zoom.</p>
        <a class="link" href="https://sketchfab.com/models/a48523a63b4e4a82ae886075d71c7139" target="_blank" rel="noopener noreferrer">Open full-screen source model</a>
      </section>
    </div>
  </body>
</html>
